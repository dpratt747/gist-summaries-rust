name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  OLLAMA_VERSION: v0.19.0

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ollama_url_suffix: ollama-darwin.tgz
            ollama_archive: tgz
          - os: macos-latest
            target: x86_64-apple-darwin
            ollama_url_suffix: ollama-darwin.tgz
            ollama_archive: tgz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ollama_url_suffix: ollama-linux-amd64.tar.zst
            ollama_archive: zst
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ollama_url_suffix: ollama-windows-amd64.zip
            ollama_archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: cd front-end && npm install

      - name: Symlink backend for Tauri CLI
        run: ln -s ../backend front-end/src-tauri
        shell: bash

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            zstd

      - name: Download Ollama sidecar (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd backend
          URL="https://github.com/ollama/ollama/releases/download/${{ env.OLLAMA_VERSION }}/${{ matrix.ollama_url_suffix }}"
          curl -fL "$URL" -o ollama-archive

          if [ "${{ matrix.ollama_archive }}" = "tgz" ]; then
            tar xzf ollama-archive
          elif [ "${{ matrix.ollama_archive }}" = "zst" ]; then
            zstd -d ollama-archive -o ollama-archive.tar
            tar xf ollama-archive.tar
          fi

          FOUND="$(find . -name 'ollama' -type f ! -name '*.tgz' ! -name '*.tar' | head -1)"
          cp "$FOUND" "ollama-${{ matrix.target }}"
          chmod +x "ollama-${{ matrix.target }}"
          rm -rf ollama-archive* bin/ lib/
          ls -lh "ollama-${{ matrix.target }}"

      - name: Download Ollama sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd backend
          $url = "https://github.com/ollama/ollama/releases/download/${{ env.OLLAMA_VERSION }}/${{ matrix.ollama_url_suffix }}"
          Invoke-WebRequest -Uri $url -OutFile ollama-archive.zip
          Expand-Archive -Path ollama-archive.zip -DestinationPath ollama-extracted
          $found = Get-ChildItem -Path ollama-extracted -Recurse -Filter "ollama.exe" | Select-Object -First 1
          Copy-Item $found.FullName -Destination "ollama-${{ matrix.target }}.exe"
          Remove-Item -Recurse -Force ollama-archive.zip, ollama-extracted
          Get-Item "ollama-${{ matrix.target }}.exe"

      - name: Create models directory
        run: mkdir -p backend/models && touch backend/models/.keep
        shell: bash

      - name: Build frontend
        run: cd front-end && npm run build

      - name: Build Tauri app
        shell: bash
        run: |
          DIST_PATH="$(cd front-end/dist && pwd)"
          cd front-end
          TAURI_CONFIG="{\"build\":{\"frontendDist\":\"$DIST_PATH\",\"beforeBuildCommand\":\"\",\"beforeDevCommand\":\"\"}}" \
            npx tauri build --target ${{ matrix.target }}

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/bundle/msi/*.msi artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/bundle/nsis/*.exe artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gist-summary-${{ matrix.target }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Gist Summary ${{ github.ref_name }}"
          body: "See the assets below to download for your platform."
          files: artifacts/*
